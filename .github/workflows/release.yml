# Tag v* — the release build (implementation/build.md, D-098).
#
# Pushing a `v*` tag IS cutting the milestone build: the full suite runs, the
# wheel is built with the embedded frontend, and a GitHub Release is published
# from the tag. Prerelease candidates are `v*-rc.*` tags.
#
# The full suite at a tag is the merge gate (unit + component) PLUS the three upper
# tiers — the service tier, the FULL kill-9 crash sweep (every registry point, not the
# bounded CI subset the master `push` gate runs), and the e2e acceptance loop including
# the Playwright browser scenario. All three need the multi-repo checkout (blizzard +
# blizzard-mock + the public blizzard-workspace as the winter source) laid out as the
# siblings their discovery expects — the same setup the `push` workflow proves green.
#
# The GitHub Release is published with the workflow's built-in GITHUB_TOKEN — no
# external registry and no user-supplied secret. The wheel is attached to the
# release; there is no package-index publish.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  gate:
    uses: ./.github/workflows/gate.yml

  full-suite-tiers:
    name: service + FULL crash sweep + e2e
    needs: [gate]
    runs-on: ubuntu-latest
    steps:
      - name: checkout blizzard
        uses: actions/checkout@v4
        with:
          path: blizzard
      - name: checkout blizzard-mock (the mock fleet + fixture scaffold)
        uses: actions/checkout@v4
        with:
          repository: paul-gross/blizzard-mock
          path: blizzard-mock
      - name: checkout blizzard-workspace (the winter source)
        uses: actions/checkout@v4
        with:
          repository: paul-gross/blizzard-workspace
          path: blizzard-workspace
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - name: install mise (the fixture drives the winter CLI via `mise exec -- uv run`)
        uses: jdx/mise-action@v2
        with:
          install: false
      - name: git identity for fixture/forge git operations
        run: |
          git config --global user.email "ci@blizzard.local"
          git config --global user.name "blizzard CI"
      - name: provision blizzard (hub + runner daemons)
        run: cd blizzard && uv sync
      - name: provision blizzard-mock (mock fleet + fixture + mock-claude-code)
        run: cd blizzard-mock && uv sync
      - name: install Chromium for the e2e browser scenario (Playwright)
        run: cd blizzard && uv run playwright install --with-deps chromium
      - name: service tier (blizzard:service-test)
        env:
          BLIZZARD_SERVICE: "1"
          BLIZZARD_MOCK_WINTER_SOURCE: ${{ github.workspace }}/blizzard-workspace
        run: cd blizzard && uv run pytest tests/service/ -v
      - name: FULL kill-9 crash sweep (every registry point) — `mise run crash-sweep`
        env:
          BLIZZARD_CRASH_SWEEP: "1"
          BLIZZARD_MOCK_WINTER_SOURCE: ${{ github.workspace }}/blizzard-workspace
        run: cd blizzard && uv run pytest -m crash_sweep tests/crash/ -v
      - name: e2e acceptance loop incl. the browser scenario — `mise run e2e`
        env:
          BLIZZARD_E2E: "1"
          BLIZZARD_MOCK_WINTER_SOURCE: ${{ github.workspace }}/blizzard-workspace
        run: cd blizzard && uv run pytest tests/e2e/ -v

  release:
    name: build wheel and publish release
    needs: [gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: derive version from tag
        id: ver
        run: |
          # v0.1.0 -> 0.1.0 ; v0.1.0-rc.1 -> 0.1.0-rc.1 (hatchling normalizes the
          # PEP 440 pre-release form). The version scheme is 0.<milestone>.<patch>.
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          case "$TAG" in
            *-rc.*) echo "prerelease=true"  >> "$GITHUB_OUTPUT" ;;
            *)      echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac
          echo "Release version: $VERSION"
      - name: build the release wheel (embedded frontend + node-free install proof)
        env:
          BLIZZARD_VERSION: ${{ steps.ver.outputs.version }}
        run: ./scripts/build-wheel.sh
      - name: publish GitHub Release with the wheel attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS=(--generate-notes --title "${GITHUB_REF_NAME}")
          if [ "${{ steps.ver.outputs.prerelease }}" = "true" ]; then
            FLAGS+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" dist/*.whl "${FLAGS[@]}"
