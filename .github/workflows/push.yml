# Push to master — the merge gate plus the extra tiers and a dev build
# (implementation/build.md).
#
# Runs the full PR gate, then the service tier and the crash sweep, then
# publishes a dev-build wheel as a workflow artifact for fleet dogfooding.
#
# The e2e acceptance-loop smoke test EXISTS as of P6 (`mise run e2e` — the standing
# proof of the verification.md loop), but it is a LOCAL command: it self-manages the
# forge+hub+runner and drives a minted blizzard-mock fixture, so it needs the sibling
# `blizzard-mock` worktree and a local winter source that a single-repo CI checkout
# does not have. Wiring it headless in CI needs a multi-repo checkout (blizzard +
# blizzard-mock + a winter source) — that remains a gap. The crash sweep depends on
# the P7 crash-correctness machinery. Both stay explicit no-op jobs here so this
# workflow is green and the remaining gaps are visible rather than silently omitted.
name: push

on:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: push-master
  cancel-in-progress: false

jobs:
  gate:
    uses: ./.github/workflows/gate.yml

  e2e-service-tier:
    name: e2e / service tier (LOCAL — `mise run e2e`)
    needs: [gate]
    runs-on: ubuntu-latest
    steps:
      - name: skipped — needs a multi-repo checkout
        run: |
          echo "::notice title=e2e acceptance loop is LOCAL (mise run e2e)::The P6 acceptance-loop e2e (tests/e2e/test_acceptance_loop.py — ingest→acquire→mock commit→deliver→landed, asserting bare-main reachability + derived done) EXISTS and is the standing smoke test, run locally with 'mise run e2e' (BLIZZARD_E2E=1). It self-manages forge+hub+runner over a minted blizzard-mock fixture, so headless CI needs a multi-repo checkout (blizzard + blizzard-mock + a winter source) this single-repo workflow does not provide — that wiring is the remaining gap. A running-daemon service tier exercised from outside (Playwright) is P7."

  crash-sweep:
    name: crash sweep (PENDING — P6)
    needs: [gate]
    runs-on: ubuntu-latest
    steps:
      - name: skipped — P6 gap
        run: |
          echo "::notice title=crash sweep PENDING (P6)::The kill-9 crash sweep (blizzard:crash-sweep — daemons as real subprocesses, invariant checker after each armed crash) depends on the steppable loop, injected clock, crash-point registry, and checker that land in P6 (architecture/crash-correctness.md). This step is a deliberate no-op. Replace it with the real sweep when P6 lands."

  dev-build:
    name: dev build wheel artifact
    needs: [gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      # Node builds the embedded Angular apps once the web workspace lands; until
      # then build-wheel.sh ships the committed placeholder assets (node-free).
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: compute dev version 0.<milestone>.0.dev<run>
        id: ver
        run: |
          # The version scheme is 0.<milestone>.<patch> pre-1.0. A dev build off
          # master targets the milestone in progress at patch 0, tagged with the
          # run number: 0.<milestone>.0.dev<run> (implementation/build.md).
          BASE=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          MINOR=$(echo "$BASE" | cut -d. -f2)
          DEV="0.${MINOR}.0.dev${{ github.run_number }}"
          echo "version=$DEV" >> "$GITHUB_OUTPUT"
          echo "Dev build version: $DEV"
      - name: build the dev wheel (embedded frontend + node-free install proof)
        env:
          BLIZZARD_VERSION: ${{ steps.ver.outputs.version }}
        run: ./scripts/build-wheel.sh
      - name: upload dev wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: blizzard-dev-wheel-${{ steps.ver.outputs.version }}
          path: dist/*.whl
          if-no-files-found: error
