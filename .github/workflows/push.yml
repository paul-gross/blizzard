# Push to master — the merge gate plus the extra tiers and a dev build.
#
# Runs the full PR gate, then the SERVICE tier and the kill-9 CRASH SWEEP as REAL
# gates (blizzard-harness verification/blizzard.md: blizzard:service-test,
# blizzard:crash-sweep), then publishes a dev-build wheel as a workflow artifact for
# fleet dogfooding.
#
# Both upper tiers need what a single-repo checkout does not carry: the sibling
# `blizzard-mock` worktree (the mock fleet + fixture scaffold) and a local winter
# source (its committed `tools/winter-cli`, which the fixture clones to mint a real
# disposable winter workspace over `file://` origins — no tokens, no forge, no network
# beyond package installs). This workflow provides them with a multi-repo checkout:
# `blizzard`, `blizzard-mock`, and the public `blizzard-workspace` (the winter source)
# laid out as SIBLINGS under $GITHUB_WORKSPACE — exactly the on-disk layout the tiers'
# discovery expects (`tests/service/support.py`, `tests/crash/support.py`:
# `blizzard_root().parent / "blizzard-mock"`, `BLIZZARD_MOCK_WINTER_SOURCE`).
#
# The FULL 22-point kill-9 sweep runs ~130s locally and multiples of that on a 2-core
# GitHub runner, so this workflow runs the sweep's bounded CI profile
# (BLIZZARD_CRASH_SWEEP_CI=1 — a representative crash point per boundary family plus the
# two whole-process cases and the recovery-critical windows); the FULL sweep stays the
# documented local command (`mise run crash-sweep`) and runs in the tag `release`
# workflow. The e2e acceptance loop (`mise run e2e`, incl. the Playwright board scenario)
# remains a local + tag-only tier, not a `push` gate (build.md).
name: push

on:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: push-master
  cancel-in-progress: false

jobs:
  gate:
    uses: ./.github/workflows/gate.yml

  upper-tiers:
    needs: [gate]
    uses: ./.github/workflows/upper-tiers.yml
    with:
      crash_sweep_ci: "1"

  dev-build:
    name: dev build wheel artifact
    needs: [gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      # Node builds the embedded Angular apps once the web workspace lands; until
      # then build-wheel.sh ships the committed placeholder assets (node-free).
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: compute dev version 0.<milestone>.0.dev<run>
        id: ver
        run: |
          # The version scheme is 0.<milestone>.<patch> pre-1.0. A dev build off
          # master targets the milestone in progress at patch 0, tagged with the
          # run number: 0.<milestone>.0.dev<run>.
          BASE=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          MINOR=$(echo "$BASE" | cut -d. -f2)
          DEV="0.${MINOR}.0.dev${{ github.run_number }}"
          echo "version=$DEV" >> "$GITHUB_OUTPUT"
          echo "Dev build version: $DEV"
      - name: build the dev wheel (embedded frontend + node-free install proof)
        env:
          BLIZZARD_VERSION: ${{ steps.ver.outputs.version }}
        run: ./scripts/build-wheel.sh
      - name: upload dev wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: blizzard-dev-wheel-${{ steps.ver.outputs.version }}
          path: dist/*.whl
          if-no-files-found: error
