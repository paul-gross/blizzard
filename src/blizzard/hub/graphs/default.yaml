# The default workflow graph — build -> review -> deliver.
#
# The autonomous-baseline shape: the canonical review-fail cycle with NO
# human gate. Promoted from the P6 walking-skeleton `build -> deliver` slice to the
# full MVP graph (milestone:mvp): build hands to a cold-eyes review node, review
# either passes to delivery or fails the work back into build carrying its findings
# asset (the review node). Insert an `approve-gate` human node
# ahead of `deliver` to dial HITL back up — graphs are
# immutable, so that is a re-mint, not an edit.
#
# Conforms to the canonical authoring schema: fused choice/edge entries, prompts as
# file references inlined at mint, retries escaping to escalation, the review-fail
# edge carrying the findings asset + its prompt_addendum back into build. Delivery is
# authored as graph CONTENT, not an engine special case: `deliver` is a generic hub
# command node (`executor: hub` + `run:`) whose script the hub itself executes — no
# agent, ever (`bzh:deterministic-shell`). Its `run:` step invokes
# `hub/graphs/scripts/land_default.py`, which owns the check-all-then-push-all mechanics
# and the `merged/<repo>` marker convention; the hub-command-node authoring contract
# both scripts honor lives in `blizzard-harness:/standards/hub-nodes.md`. A conflict at
# the check stage routes `conflict -> build` (nothing pushed); a clean land routes
# `landed -> done`. See `hub/graphs/delivery-pr-ci.yaml` for the alternative PR +
# CI-watch delivery policy this same primitive expresses — proof that delivery policy
# lives in YAML, not code.
# Operational metadata (enabled, auto_migrate, migration_target) is NOT authored
# here — it is set after mint via PATCH /graphs/{id}.

name: default-delivery
entry: build

nodes:
  build:
    executor: runner
    prompt: ./prompts/build.md
    checks:
      - mise run lint
      - mise run test
    judgement:
      prompt: ./prompts/build.judgement.md
      choices:
        pass:
          description: The work meets this node's criteria and the checks are green.
          to: review
        fail:
          description: The work does not meet the criteria; the failure output is attached.
          to: build
          prompt_addendum: ./prompts/build.from-build.md
    retries:
      max: 2
      exhausted: escalate

  review:
    executor: runner
    prompt: ./prompts/review.md
    session: fresh  # cold eyes for review; the default is resume
    produces:
      - review-findings  # asset artifact — carried back into build on a fail
    judgement:
      prompt: ./prompts/review.judgement.md
      choices:
        pass:
          description: The submitted work passes review and is ready to deliver.
          to: deliver
        fail:
          description: Review found blocking issues, recorded in the review-findings asset.
          to: build  # THE LOOP: the findings asset rides this edge back into build
          prompt_addendum: ./prompts/build.from-review.md
    retries:
      max: 2
      exhausted: escalate

  deliver:
    executor: hub
    run:
      - name: land-every-repo
        command: python3 -m blizzard.hub.graphs.scripts.land_default
    judgement:
      choices:
        landed:
          description: Every repo merged cleanly into its base branch.
          to: done
        conflict:
          description: A repo did not merge cleanly; kicked back to build with the bounce envelope.
          to: build
