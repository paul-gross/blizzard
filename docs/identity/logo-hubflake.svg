<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Blizzard "hub-flake": snowflake as hub-and-spoke orchestration graph.
       Snow-white flake, amber hub. -->
  <defs>
    <g id="spoke">
      <line x1="32" y1="23" x2="32" y2="12" stroke="#eef4fb" stroke-width="2.6" stroke-linecap="round"/>
      <!-- branch chevron -->
      <line x1="32" y1="17" x2="26.9" y2="14.1" stroke="#eef4fb" stroke-width="2" stroke-linecap="round"/>
      <line x1="32" y1="17" x2="37.1" y2="14.1" stroke="#eef4fb" stroke-width="2" stroke-linecap="round"/>
      <!-- agent node at tip -->
      <circle cx="32" cy="8" r="3.2" fill="#5cd1e5"/>
    </g>
  </defs>
  <use href="#spoke"/>
  <use href="#spoke" transform="rotate(60 32 32)"/>
  <use href="#spoke" transform="rotate(120 32 32)"/>
  <use href="#spoke" transform="rotate(180 32 32)"/>
  <use href="#spoke" transform="rotate(240 32 32)"/>
  <use href="#spoke" transform="rotate(300 32 32)"/>
  <!-- hub node -->
  <circle cx="32" cy="32" r="5.4" fill="#f2b25c"/>
  <circle cx="32" cy="32" r="8.6" fill="none" stroke="#f2b25c" stroke-width="1.4" opacity="0.45"/>
</svg>
