<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Blizzard favicon: the full hub-flake at true proportions (tiny weight bump
       for rasterization), transparent background; tuned for 48/32px. -->
  <defs>
    <g id="fs">
      <line x1="16" y1="11.5" x2="16" y2="6" stroke="#eef4fb" stroke-width="1.4" stroke-linecap="round"/>
      <line x1="16" y1="8.5" x2="13.45" y2="7.05" stroke="#eef4fb" stroke-width="1.1" stroke-linecap="round"/>
      <line x1="16" y1="8.5" x2="18.55" y2="7.05" stroke="#eef4fb" stroke-width="1.1" stroke-linecap="round"/>
      <circle cx="16" cy="4" r="1.8" fill="#5cd1e5"/>
    </g>
  </defs>
  <use href="#fs"/>
  <use href="#fs" transform="rotate(60 16 16)"/>
  <use href="#fs" transform="rotate(120 16 16)"/>
  <use href="#fs" transform="rotate(180 16 16)"/>
  <use href="#fs" transform="rotate(240 16 16)"/>
  <use href="#fs" transform="rotate(300 16 16)"/>
  <circle cx="16" cy="16" r="2.8" fill="#f2b25c"/>
  <circle cx="16" cy="16" r="4.4" fill="none" stroke="#f2b25c" stroke-width="0.8" opacity="0.45"/>
</svg>
