      <line x1="32" y1="24" x2="32" y2="13" stroke="#f2b25c" stroke-width="2.6" stroke-linecap="round"/>
      <circle cx="32" cy="9.5" r="3" fill="#5cd1e5"/>
    </g>
  </defs>
  <circle cx="32" cy="32" r="22.5" fill="none" stroke="#2b6675" stroke-width="1.4" stroke-dasharray="3.2 4.6" stroke-linecap="round"/>
  <use href="#spoke-o"/>
  <use href="#spoke-o" transform="rotate(60 32 32)"/>
  <use href="#spoke-o" transform="rotate(120 32 32)"/>
  <use href="#spoke-o" transform="rotate(180 32 32)"/>
  <use href="#spoke-o" transform="rotate(240 32 32)"/>
