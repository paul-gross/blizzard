[tools]
uv = "0.11.21"

[tasks.install]
description = "Install dependencies"
run = "uv sync"

[tasks.test]
description = "Run tests"
run = "uv run pytest"

[tasks.lint]
description = "Lint with ruff"
run = "uv run ruff check ."

[tasks.format]
description = "Format with ruff"
run = "uv run ruff format ."

[tasks.typecheck]
description = "Type-check with pyright"
run = "uv run pyright"

[tasks.export-openapi]
description = "Export the hub and runner OpenAPI specs to ./openapi (frontend codegen + CI drift baseline)"
run = "uv run blizzard-export-openapi --out-dir openapi"

[tasks.gate]
description = "Run the local equivalent of the PR-to-master merge gate (ruff, pyright, pytest, spec/client drift, eslint, vitest)"
run = "./scripts/ci-gate.sh"

[tasks.build]
description = "The one build entrypoint: build both Angular apps into the embed dir, build the wheel, and verify it embeds the assets and installs+runs node-free"
run = "./scripts/build-wheel.sh"
