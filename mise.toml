[tools]
uv = "0.11.21"

[tasks.install]
description = "Install dependencies"
run = "uv sync"

[tasks.test]
description = "Run the default unit + component suite, parallelized (pytest-xdist)"
run = "uv run pytest -n auto"

[tasks.e2e]
description = "Run the standing e2e smoke suite (verification.md) â€” six full-stack scenarios (happy-path buildâ†’reviewâ†’deliver, review-fail cycle, retries-exhausted escalation, ask/answer, human gate, and the browser-driven board) self-managed over forge+hub+runner + a minted blizzard-mock fixture; needs the sibling blizzard-mock worktree provisioned (winter provision <env>), and the browser scenario also needs Chromium (uv run playwright install chromium) â€” it skips cleanly without it"
# The browser scenario drives the *built* bundle that `blizzard hub host` serves out of
# src/blizzard/static/, not the sources â€” so a stale bundle does not fail loudly, it
# silently tests the previous UI and can go green against a layout that no longer
# exists. Depending on web-build makes that unfireable; three separate sessions
# rediscovered it by hand when this was documented prose instead.
depends = ["web-build"]
run = "BLIZZARD_E2E=1 uv run pytest tests/e2e/"

[tasks.crash-sweep]
description = "Run the FULL kill-9 crash sweep (blizzard:crash-sweep) â€” arms EVERY crash-point-registry point in turn, SIGKILLs the owning daemon there, and asserts the invariant checker + exactly-once delivery after recovery; needs the sibling blizzard-mock worktree provisioned (winter provision <env>)"
run = "BLIZZARD_CRASH_SWEEP=1 uv run pytest -m crash_sweep tests/crash/"

[tasks.crash-sweep-ci]
description = "Run the kill-9 crash sweep's bounded CI profile (BLIZZARD_CRASH_SWEEP_CI=1) â€” a representative crash-point subset (one per boundary family + the recovery-critical windows) plus the two whole-process cases, so the `pr` and `push` gates both stay real at bounded GitHub-runner runtime. The FULL sweep is `mise run crash-sweep`."
run = "BLIZZARD_CRASH_SWEEP=1 BLIZZARD_CRASH_SWEEP_CI=1 uv run pytest -m crash_sweep tests/crash/"

[tasks.journey]
description = "Run the capstone MVP acceptance-journey rehearsal (blizzard:journey) â€” the whole MVP acceptance journey end to end over real host daemons: five issues in (two grouped, the riskiest reordered to the top), an autonomous buildâ†’reviewâ†’deliver night exhibiting a clean multi-repo land, a review-fail loop, an ask that parks and is answered, and a genuine failure that escalates, a mid-run SIGKILL reboot of both daemons, and the morning-after assertions (merged to bare main, full hub history+artifacts, resumed-without-takeover, nothing worked twice, no orphaned env, truthful `hub status`). Local-only like the crash sweep â€” needs the sibling blizzard-mock worktree provisioned (winter provision <env>)"
run = "BLIZZARD_JOURNEY=1 uv run pytest -m journey tests/journey/"

[tasks.service-test]
description = "Run the service tier â€” a running daemon's HTTP API exercised from outside with the counterpart mocked: the runner against the mock hub (unreachableâ†’buffered, dropped-ackâ†’idempotent, stale-envelope), and the hub against the mock runner + mock forge (claim/completion, stale-epoch rejection, queue shaping, SSE). sqlite only, no tokens/network; needs the sibling blizzard-mock worktree provisioned (winter provision <env>) â€” skips cleanly without it"
run = "BLIZZARD_SERVICE=1 uv run pytest tests/service/"

[tasks.lint]
description = "Lint with ruff"
run = "uv run ruff check ."

[tasks.format]
description = "Format with ruff"
run = "uv run ruff format ."

[tasks.typecheck]
description = "Type-check with pyright"
run = "uv run pyright"

[tasks.export-openapi]
description = "Export the hub and runner OpenAPI specs to ./openapi (frontend codegen + CI drift baseline)"
run = "uv run blizzard-export-openapi --out-dir openapi"

[tasks.gate]
description = "Run the local equivalent of the PR-to-master merge gate (ruff, pyright, pytest, spec/client drift, eslint, vitest)"
run = "./scripts/ci-gate.sh"

[tasks.build]
description = "The one build entrypoint: build both Angular apps into the embed dir, build the wheel, and verify it embeds the assets and installs+runs node-free"
run = "./scripts/build-wheel.sh"

# Frontend (Angular workspace under web/). Mirror of the web/package.json scripts
# CI invokes; namespaced `web-*` so they don't collide with the Python tasks.
[tasks.web-install]
description = "Install frontend dependencies (npm ci in web/)"
dir = "web"
run = "npm ci"

[tasks.web-lint]
description = "Lint the Angular workspace (eslint, no prettier)"
dir = "web"
run = "npm run lint"

[tasks.web-test]
description = "Run the frontend unit/component tier (vitest)"
dir = "web"
run = "npm run test"

[tasks.web-build]
description = "Build both apps into src/blizzard/static/{hub,runner} for the wheel embed"
dir = "web"
run = "npm run build"

[tasks.web-generate-client]
description = "Regenerate the openapi-ts clients from ./openapi (CI drift check baseline)"
dir = "web"
run = "npm run generate:client"
